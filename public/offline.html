<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Liturgia · Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f0f9ff;
        color: #003366;
        font-family: "Times New Roman", Times, serif;
      }
      main {
        width: min(92vw, 560px);
        background: #ffffff;
        border: 1px solid #dbeafe;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 51, 102, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
      }
      .hint {
        margin-top: 12px;
        font-size: 0.95rem;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Você está offline</h1>
      <p>
        Não foi possível carregar esta página agora. Assim que sua conexão voltar,
        tente novamente para continuar sua leitura e devoção.
      </p>
      <p class="hint">Dica: abra novamente pela tela inicial do app para acesso mais rápido.</p>
    </main>
  </body>
</html>
